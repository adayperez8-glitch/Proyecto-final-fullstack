# CI de Brote: en cada push/PR corre los tests del backend (con un PostgreSQL
# efímero para los tests de integración) y comprueba que el frontend compila.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend · tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brote_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/brote_test
      JWT_SECRET: ci-secret-solo-para-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # BD recién creada y vacía: db push aplica el schema directamente
      # (aquí no existe la trampa de drift de las BD reales).
      - run: npx prisma db push --skip-generate
      - run: npx prisma generate
      - run: npm test

  frontend:
    name: Frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
